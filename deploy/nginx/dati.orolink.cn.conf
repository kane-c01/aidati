# ====================================================
# 生产: https://dati.orolink.cn
# - 同域: 管理后台静态资源 + 业务 API (/v1) + 探活 (/healthz 等)
# - 证书: certbot 签发后路径见下方 ssl_certificate*
#
# 安装:
#   sudo ln -sf /path/to/aidati/deploy/nginx/dati.orolink.cn.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 首次申请证书(确保 DNS A 记录已指向本机,且 80 端口对外开放):
#   sudo certbot certonly --webroot -w /var/www/certbot -d dati.orolink.cn --email YOUR@EMAIL -agree-tos --no-eff-email
# 或交互式:
#   sudo certbot --nginx -d dati.orolink.cn
# ====================================================

# ACME HTTP-01 验证目录( certbot webroot 用; mkdir -p /var/www/certbot )
server {
    listen 80;
    listen [::]:80;
    server_name dati.orolink.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dati.orolink.cn;

    # certbot 默认路径(证书签发后自动生成)
    ssl_certificate /etc/letsencrypt/live/dati.orolink.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dati.orolink.cn/privkey.pem;
    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 管理后台构建产物( pnpm build:admin → admin-web/dist )
    root /var/www/aidati/admin-web/dist;
    index index.html;

    # 大文件:用户 PDF / 图片上传
    client_max_body_size 120m;

    # NestJS 业务 API (应用监听 127.0.0.1:3000 时改下方 upstream)
    location /v1/ {
        proxy_pass http://127.0.0.1:3000/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 不带 /v1 前缀的探针与指标(main.ts exclude)
    location = /healthz {
        proxy_pass http://127.0.0.1:3000/healthz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /readyz {
        proxy_pass http://127.0.0.1:3000/readyz;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /version {
        proxy_pass http://127.0.0.1:3000/version;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /metrics {
        # 生产建议仅内网或加 IP 白名单 / Basic Auth
        proxy_pass http://127.0.0.1:3000/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
