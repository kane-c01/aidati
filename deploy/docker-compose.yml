# ====================================================
# 本地开发环境 - Docker Compose
# 文档:开发文档/05-部署运维与安全.md §2.2
#
# 默认只启动基础设施(MySQL / Redis / MinIO)
# 应用服务(backend / ai-service)放在 profile: app, 按需启动
#
# 用法:
#   docker compose -f deploy/docker-compose.yml up -d                 # 仅起基础设施
#   docker compose -f deploy/docker-compose.yml --profile app up -d   # 全部起
# ====================================================

name: ai-quiz-dev

networks:
  ai-quiz-net:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  minio-data:

services:
  # === 数据库 ===
  mysql:
    image: mysql:8.0
    container_name: ai-quiz-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: dev_root
      MYSQL_DATABASE: ai_quiz
      MYSQL_USER: app
      MYSQL_PASSWORD: dev_app
      TZ: Asia/Shanghai
    ports:
      # 宿主机 3307 → 容器 3306, 避免与本机其它 MySQL 实例冲突
      - '3307:3306'
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-quiz-net

  # === 缓存 / 队列 ===
  redis:
    image: redis:7-alpine
    container_name: ai-quiz-redis
    restart: unless-stopped
    ports:
      # 宿主机 6380 → 容器 6379, 避免与本机其它 Redis 冲突
      - '6380:6379'
    volumes:
      - redis-data:/data
    command:
      - redis-server
      - --appendonly
      - 'yes'
      - --maxmemory
      - 512mb
      # BullMQ 要求 noeviction;否则任务可能被驱逐导致数据丢失
      - --maxmemory-policy
      - noeviction
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ai-quiz-net

  # === 对象存储(本地用 MinIO 模拟 OSS / COS)===
  minio:
    image: minio/minio:latest
    container_name: ai-quiz-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ai-quiz-net

  # === MinIO 自动建桶(一次性 init job)===
  minio-init:
    image: minio/mc:latest
    container_name: ai-quiz-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/ai-quiz-dev || true;
      mc anonymous set download local/ai-quiz-dev || true;
      echo 'MinIO bucket ready: ai-quiz-dev';
      "
    networks:
      - ai-quiz-net

  # === 业务后端(M1 起可启动)===
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: ai-quiz-backend
    profiles: ['app']
    restart: unless-stopped
    env_file:
      - ../backend/.env
    ports:
      - '3000:3000'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ai-quiz-net

  # === AI 编排服务(M3 起可启动)===
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: ai-quiz-ai-service
    profiles: ['app']
    restart: unless-stopped
    env_file:
      - ../ai-service/.env
    ports:
      - '8000:8000'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-quiz-net
